name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true

      - name: Download SQLite amalgamation (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p third_party/sqlite
          curl -L https://www.sqlite.org/2025/sqlite-amalgamation-3490100.zip -o sqlite.zip
          unzip sqlite.zip
          mv sqlite-amalgamation-3490100/sqlite3.c third_party/sqlite/
          mv sqlite-amalgamation-3490100/sqlite3.h third_party/sqlite/
          rm -rf sqlite-amalgamation-3490100 sqlite.zip

      - name: Download SQLite amalgamation (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path third_party/sqlite
          Invoke-WebRequest -Uri "https://www.sqlite.org/2025/sqlite-amalgamation-3490100.zip" -OutFile sqlite.zip
          Expand-Archive sqlite.zip -DestinationPath .
          Copy-Item sqlite-amalgamation-3490100/sqlite3.c third_party/sqlite/
          Copy-Item sqlite-amalgamation-3490100/sqlite3.h third_party/sqlite/
          Remove-Item -Recurse sqlite-amalgamation-3490100, sqlite.zip

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release
        env:
          QT_QPA_PLATFORM: offscreen

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.1'
          cache: true

      - name: Generate documentation
        run: qdoc docs/qsqlitesyncengine.qdocconf --outputdir build/docs --debug
        env:
          QT_DIR: ${{ env.QT_ROOT_DIR }}
          QT_INSTALL_HEADERS: ${{ env.QT_ROOT_DIR }}/include
          QT_INSTALL_DOCS: ${{ env.QT_ROOT_DIR }}/doc

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/docs
